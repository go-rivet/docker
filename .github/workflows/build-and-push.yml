name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      rivet_version:
        description: 'Rivet version to build'
        required: true
        default: 'main'
  repository_dispatch:
    types: [rivet-release]

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64,linux/arm/v7
  REPO_BASE: go-rivet/rivet

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.rivet_version }}" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_BASE }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ steps.resolve.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.resolve.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.resolve.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(steps.resolve.outputs.version, '-') && steps.resolve.outputs.version != 'main' }}
            type=raw,value=${{ steps.resolve.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RIVET_VERSION=${{ steps.resolve.outputs.version }}
